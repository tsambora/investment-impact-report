<!DOCTYPE html>
<html lang="id">

  <title>Impact Report</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FAFAF7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

        monthLabels: ["Sep", "Okt", "Nov", "Des", "Jan", "Feb"],
        industries: [
          { name: "Perdagangan", count: 7, icon: "🏪" },
          { name: "Pertanian", count: 4, icon: "🌾" },
          { name: "Ternak Ayam", count: 3, icon: "🐔" },
          { name: "Konveksi", count: 2, icon: "🧵" },

          { name: "Purwokerto", lat: -7.43, lng: 109.23, province: "Jawa Tengah" },
          { name: "Magelang", lat: -7.47, lng: 110.22, province: "Jawa Tengah" },
          { name: "Malang", lat: -7.98, lng: 112.63, province: "Jawa Timur" },
          { name: "Jember", lat: -8.17, lng: 113.7, province: "Jawa Timur" },
          { name: "Mataram", lat: -8.58, lng: 116.1, province: "NTB" },
        ],
      };

      const formatRupiah = (num) => "Rp " + num.toLocaleString("id-ID");

            margin: "0 auto",

            fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
            position: "relative",
            overflowX: "hidden",
          }}
        >
          <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"

          />

                <path d="M8 7C9.7 7 11.2 7.7 12.3 8.9L13.6 7.4C12.1 5.9 10.2 5 8 5S3.9 5.9 2.4 7.4L3.7 8.9C4.8 7.7 6.3 7 8 7Z" />

              <svg width="25" height="12" viewBox="0 0 25 12" fill="#1a1a1a">

                <rect x="2" y="3" width="14" height="6" rx="1" fill="#34C759" />
                <rect x="23" y="4" width="2" height="4" rx="0.5" />
              </svg>
            </div>
          </div>

          {/* Header */}
          <div style={{ padding: "8px 20px 16px", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: "#F0ECF5", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B21A8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </div>
            <div>
              <div style={{ fontSize: 11, color: "#8B7A9E", fontWeight: 500, letterSpacing: 0.8, textTransform: "uppercase" }}>Laporan Bulanan</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#1a1a1a", fontFamily: "'Fraunces', Georgia, serif" }}>{data.month}</div>
            </div>
          </div>

          {/* Scrollable content */}
          <div style={{ overflowY: "auto", paddingBottom: 100 }}>
            {/* Spotlight */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "linear-gradient(145deg, #6B21A8 0%, #7E3FBA 40%, #9B59C4 100%)", borderRadius: 20, overflow: "hidden", position: "relative" }}>
                <svg style={{ position: "absolute", top: 0, right: 0, opacity: 0.08 }} width="200" height="200" viewBox="0 0 200 200">
                  <circle cx="150" cy="50" r="80" fill="white" />
                  <circle cx="180" cy="90" r="50" fill="white" />
                  <circle cx="120" cy="20" r="30" fill="white" />
                </svg>

                    <span>📍</span>{data.spotlight.village}

                  </div>
                </div>
              </div>
            </div>

            {/* Hero Metrics */}

              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>

                    <div style={{ fontSize: 17, fontWeight: 700, color: "#059669", fontFamily: "'DM Sans', sans-serif", marginBottom: 2 }}>{(data.returnsThisMonth / 1000).toFixed(0)}rb</div>
                    <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 500 }}>Imbal hasil</div>
                  </div>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ width: 48, height: 48, borderRadius: 14, background: "linear-gradient(135deg, #F3E8FF, #E9D5FF)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 10px", fontSize: 20 }}>👩🏽‍🤝‍👩🏽</div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: "#6B21A8", fontFamily: "'DM Sans', sans-serif", marginBottom: 2 }}>{data.ibuMitraSupported}</div>
                    <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 500 }}>Ibu Mitra</div>
                  </div>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ width: 48, height: 48, borderRadius: 14, background: "linear-gradient(135deg, #FEF3C7, #FDE68A)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 10px", fontSize: 20 }}>🛡️</div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: "#B45309", fontFamily: "'DM Sans', sans-serif", marginBottom: 2 }}>{data.tkb90}%</div>
                    <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 500 }}>TKB90</div>
                  </div>
                </div>
                <div style={{ marginTop: 18, paddingTop: 16, borderTop: "1px solid #F3F0F7", display: "flex", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 500 }}>Total sejak bergabung</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#374151", marginTop: 2 }}>{data.ibuMitraLifetime} Ibu Mitra terbantu</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 500 }}>Total imbal hasil</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#059669", marginTop: 2 }}>{formatRupiah(data.cumulativeReturns)}</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Map */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 16, letterSpacing: 0.3 }}>Uangmu Bekerja Di</div>
                <div style={{ background: "linear-gradient(135deg, #F8F6FB 0%, #F0ECF5 100%)", borderRadius: 16, padding: "20px 16px", position: "relative", marginBottom: 16, height: 120, overflow: "hidden" }}>
                  <svg viewBox="0 0 340 100" style={{ width: "100%", height: "100%" }}>
                    <path d="M40,60 Q60,35 100,38 Q130,30 160,35 Q190,28 220,32 Q250,28 280,35 Q300,38 310,50 Q305,60 290,62 Q260,68 230,65 Q200,70 170,67 Q140,72 110,68 Q80,72 55,65 Z" fill="#E5DEEE" stroke="#C4B5D4" strokeWidth="1" />
                    <ellipse cx="320" cy="52" rx="12" ry="6" fill="#E5DEEE" stroke="#C4B5D4" strokeWidth="1" />
                    {[
                      { x: 95, y: 48, label: "Cianjur" },
                      { x: 85, y: 42, label: "Sukabumi" },
                      { x: 175, y: 40, label: "Purwokerto" },
                      { x: 200, y: 38, label: "Magelang" },
                      { x: 260, y: 40, label: "Malang" },
                      { x: 285, y: 42, label: "Jember" },
                      { x: 320, y: 48, label: "Mataram" },
                    ].map((pin, i) => (
                      <g key={i}>
                        <circle cx={pin.x} cy={pin.y} r="8" fill="#6B21A8" opacity="0.15" />
                        <circle cx={pin.x} cy={pin.y} r="4" fill="#6B21A8" />
                        <circle cx={pin.x} cy={pin.y} r="2" fill="white" opacity="0.6" />
                      </g>
                    ))}
                  </svg>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {[
                    { name: "Jawa Barat", count: 6 },
                    { name: "Jawa Tengah", count: 5 },
                    { name: "Jawa Timur", count: 4 },
                    { name: "NTB", count: 3 },
                  ].map((prov, i) => (
                    <div key={i} style={{ background: "#F8F6FB", borderRadius: 10, padding: "8px 14px", fontSize: 12, color: "#6B21A8", fontWeight: 500, display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#6B21A8", opacity: 0.6 }} />
                      {prov.name} <span style={{ fontWeight: 700 }}>{prov.count}</span>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: 14, fontSize: 13, color: "#6B7280", lineHeight: 1.5 }}>
                  Dana kamu tersebar di <strong style={{ color: "#374151" }}>{data.villages} desa</strong> di <strong style={{ color: "#374151" }}>{data.provinces} provinsi</strong>
                </div>
              </div>
            </div>

            {/* Industry */}

              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 16, letterSpacing: 0.3 }}>Sebaran Industri</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {data.industries.map((ind, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 36, height: 36, borderRadius: 10, background: "#F8F6FB", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{ind.icon}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                          <span style={{ fontSize: 13, fontWeight: 500, color: "#374151" }}>{ind.name}</span>
                          <span style={{ fontSize: 13, fontWeight: 600, color: "#6B21A8" }}>{ind.count} Ibu Mitra</span>
                        </div>
                        <div style={{ height: 6, borderRadius: 3, background: "#F3F0F7", overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${(ind.count / data.ibuMitraSupported) * 100}%`, borderRadius: 3, background: "linear-gradient(90deg, #9B59C4, #6B21A8)" }} />
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Financial Performance */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ background: "white", borderRadius: 20, padding: "22px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#8B7A9E", marginBottom: 16, letterSpacing: 0.3 }}>Performa Keuangan</div>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 100, padding: "0 4px" }}>
                    {data.monthlyReturns.map((val, i) => (
                      <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                        <div style={{ fontSize: 10, fontWeight: 600, color: i === data.monthlyReturns.length - 1 ? "#059669" : "#9CA3AF" }}>{(val / 1000).toFixed(0)}rb</div>
                        <div style={{ width: "100%", maxWidth: 36, height: `${(val / maxReturn) * 60}px`, borderRadius: 6, background: i === data.monthlyReturns.length - 1 ? "linear-gradient(180deg, #059669, #10B981)" : "linear-gradient(180deg, #E5DEEE, #D4C8E2)" }} />
                        <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 500 }}>{data.monthLabels[i]}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 14, padding: "16px 0 0", borderTop: "1px solid #F3F0F7" }}>
                  {[
                    { label: "Total investasi aktif", value: formatRupiah(data.totalInvested), color: "#374151" },
                    { label: "Imbal hasil bulan ini", value: `+${formatRupiah(data.returnsThisMonth)}`, color: "#059669" },
                    { label: "Total imbal hasil", value: `+${formatRupiah(data.cumulativeReturns)}`, color: "#059669" },
                    { label: "Yield tahunan", value: `${data.annualYield}% p.a.`, color: "#059669", sub: `vs ${data.bankRate}% deposito bank` },
                  ].map((row, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <span style={{ fontSize: 13, color: "#6B7280", fontWeight: 400 }}>{row.label}</span>
                      <div style={{ textAlign: "right" }}>
                        <span style={{ fontSize: 14, color: row.color, fontWeight: 600 }}>{row.value}</span>
                        {row.sub && <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 2 }}>{row.sub}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* CTAs */}
            <div style={{ padding: "0 20px", marginBottom: 24 }}>
              <button style={{ width: "100%", padding: "16px 24px", borderRadius: 16, border: "none", background: "linear-gradient(135deg, #6B21A8 0%, #7E3FBA 100%)", color: "white", fontSize: 15, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: "0 4px 14px rgba(107,33,168,0.3)" }}>
                <span>Tambah Investasi</span>
              </button>
              <button style={{ width: "100%", padding: "14px 24px", borderRadius: 16, border: "1.5px solid #E5DEEE", background: "white", color: "#6B21A8", fontSize: 14, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B21A8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="18" cy="5" r="3" />
                  <circle cx="6" cy="12" r="3" />
                  <circle cx="18" cy="19" r="3" />
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                </svg>
                Bagikan Dampakmu
              </button>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<ImpactReport />);
  </script>
</body>
</html>
